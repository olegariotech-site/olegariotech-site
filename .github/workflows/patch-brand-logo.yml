name: Patch Brand Logo Header

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/patch-brand-logo.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Replace OT mark with official logo
        run: |
          python3 <<'PY'
          from pathlib import Path
          p = Path('index.html')
          txt = p.read_text(encoding='utf-8')

          old = '<span class="bmark">OT</span>OLEGARIO TECH'
          new = '<span class="bmark"><img src="assets/img/brand/olegario-tech-logo-oficial.webp" alt="" aria-hidden="true"></span><span class="brand-name">OLEGARIO TECH</span>'
          if old in txt:
              txt = txt.replace(old, new, 1)
          elif 'brand-name' not in txt:
              raise SystemExit('Marca textual OT não encontrada no header')

          css_old = '.bmark{width:38px;height:38px;border-radius:13px;display:grid;place-items:center;background:rgba(168,85,247,.12);border:1px solid rgba(168,85,247,.30);color:var(--ice);box-shadow:0 0 22px rgba(168,85,247,.16)}'
          css_new = '.bmark{width:42px;height:42px;border-radius:14px;display:grid;place-items:center;background:rgba(168,85,247,.10);border:1px solid rgba(168,85,247,.30);box-shadow:0 0 22px rgba(168,85,247,.16);overflow:hidden}.bmark img{width:76%;height:76%;object-fit:contain;display:block;filter:drop-shadow(0 0 8px rgba(103,232,249,.28))}.brand-name{line-height:1;color:var(--text)}'
          if css_old in txt:
              txt = txt.replace(css_old, css_new, 1)
          elif '.bmark img' not in txt:
              raise SystemExit('CSS .bmark não encontrado para patch seguro')

          p.write_text(txt, encoding='utf-8')
          wf = Path('.github/workflows/patch-brand-logo.yml')
          if wf.exists():
              wf.unlink()
          PY
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/patch-brand-logo.yml
          git commit -m "Usa logo oficial no header" || echo "Nada para commitar"
          git push

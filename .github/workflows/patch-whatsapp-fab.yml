name: Patch WhatsApp FAB CTA

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/patch-whatsapp-fab.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Add expanding WhatsApp CTA
        run: |
          python3 <<'PY'
          from pathlib import Path
          p = Path('index.html')
          txt = p.read_text(encoding='utf-8')

          old_css = ".fab{position:fixed;right:28px;bottom:28px;z-index:90;width:60px;height:60px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(135deg,var(--green),var(--green2));box-shadow:0 14px 36px rgba(37,211,102,.32);transition:.3s}.fab:hover{transform:scale(1.07) translateY(-3px)}.fab svg{width:30px;height:30px;fill:#fff}"
          new_css = ".fab{position:fixed;right:28px;bottom:28px;z-index:90;width:60px;height:60px;border-radius:999px;display:flex;align-items:center;justify-content:center;gap:10px;background:linear-gradient(135deg,var(--green),var(--green2));box-shadow:0 14px 36px rgba(37,211,102,.32);transition:width .32s ease,transform .3s ease,box-shadow .3s ease,padding .32s ease;color:#fff;overflow:hidden;white-space:nowrap;padding:0}.fab:hover{width:286px;padding:0 22px 0 18px;transform:translateY(-3px);box-shadow:0 18px 44px rgba(37,211,102,.38)}.fab svg{width:30px;height:30px;fill:#fff;flex:0 0 30px}.fab span{max-width:0;opacity:0;overflow:hidden;font-size:.9rem;font-weight:900;line-height:1.15;letter-spacing:-.01em;transition:max-width .32s ease,opacity .22s ease}.fab:hover span{max-width:210px;opacity:1}@media(max-width:640px){.fab:hover{width:54px;padding:0}.fab span{display:none}}"
          if old_css in txt:
              txt = txt.replace(old_css, new_css, 1)
          elif '.fab span' not in txt:
              raise SystemExit('CSS do FAB não encontrado para patch seguro')

          old_html = '<a class="fab" href="https://wa.me/5511912459144?text=Ola!%20Vim%20pelo%20site%20da%20OLEGARIO%20TECH%20e%20quero%20pedir%20um%20orcamento." target="_blank" rel="noopener noreferrer" aria-label="WhatsApp"><svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg></a>'
          new_html = old_html.replace('</svg></a>', '</svg><span>Criar meu site com a Olegario Tech</span></a>')
          if old_html in txt:
              txt = txt.replace(old_html, new_html, 1)
          elif 'Criar meu site com a Olegario Tech' not in txt:
              raise SystemExit('HTML do FAB não encontrado para patch seguro')

          p.write_text(txt, encoding='utf-8')
          wf = Path('.github/workflows/patch-whatsapp-fab.yml')
          if wf.exists():
              wf.unlink()
          PY
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/patch-whatsapp-fab.yml
          git commit -m "Adiciona chamada expansiva no WhatsApp" || echo "Nada para commitar"
          git push

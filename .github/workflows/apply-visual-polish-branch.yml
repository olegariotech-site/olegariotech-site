name: Apply Visual Polish To Branch

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/apply-visual-polish-branch.yml'

permissions:
  contents: write

jobs:
  patch-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Phase 2 proof and trust updates
        run: |
          python3 <<'PY'
          from pathlib import Path
          p = Path('index.html')
          txt = p.read_text(encoding='utf-8')

          css = ''.join([
            '.proof-strip{position:relative;padding:30px 0 8px}.proof-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.proof-item{position:relative;min-height:112px;padding:18px 18px 17px;border-radius:18px;background:rgba(7,5,20,.62);border:1px solid rgba(103,232,249,.12);box-shadow:0 18px 44px rgba(0,0,0,.28),inset 0 1px 0 rgba(255,255,255,.035);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);overflow:hidden}.proof-item::before{content:\'\';position:absolute;inset:auto 18px 0;height:1px;background:linear-gradient(90deg,var(--ice),transparent);opacity:.5}.proof-item strong{display:block;font-family:\'Syne\',sans-serif;font-size:.92rem;letter-spacing:-.02em;margin-bottom:7px;color:var(--text)}.proof-item span{display:block;font-size:.79rem;line-height:1.55;color:var(--muted)}.proof-item b{display:inline-flex;margin-bottom:9px;font-size:.64rem;letter-spacing:.18em;text-transform:uppercase;color:var(--amber);font-weight:900}.sc-result{flex:1 1 360px;max-width:520px;text-align:center;font-size:.82rem;line-height:1.5;color:var(--muted);padding:0 4px}.sc-result strong{color:rgba(238,240,255,.9);font-weight:800}',
            '@media(max-width:860px){.proof-grid{grid-template-columns:repeat(2,1fr)}.proof-strip{padding-top:18px}.sc-result{flex-basis:100%;order:2}.showcase-actions .btn{order:3}}',
            '@media(max-width:640px){.proof-grid{grid-template-columns:1fr}.proof-item{min-height:auto}.sc-result{text-align:left;width:100%;font-size:.84rem}}'
          ])
          if '.proof-strip' not in txt:
              txt = txt.replace('</style>', css + '\n  </style>', 1)

          proof_html = '<section class="proof-strip" aria-label="Prova e confiança"><div class="wrap proof-grid"><div class="proof-item"><b>Projetos reais</b><strong>Sites no ar e conceitos comerciais</strong><span>Adega, advocacia, barbearia e mercado local com visual próprio.</span></div><div class="proof-item"><b>Local</b><strong>Valinhos, Campinas e região</strong><span>Presença digital pensada para negócio local que precisa gerar conversa.</span></div><div class="proof-item"><b>Conversão</b><strong>WhatsApp integrado desde o início</strong><span>Botões, mensagens prontas e caminho simples para o cliente chamar.</span></div><div class="proof-item"><b>Método</b><strong>Estratégia antes do código</strong><span>Copy, oferta, CTA, visual e publicação trabalhando juntos.</span></div></div></section>'
          hero_end = '<div class="shint">Role para sentir a experiência</div></div></section>\n      <div class="div"></div><section class="sec" id="problema">'
          if 'class="proof-strip"' not in txt:
              if hero_end not in txt:
                  raise SystemExit('Ponto de insercao da faixa de prova nao encontrado')
              txt = txt.replace(hero_end, '<div class="shint">Role para sentir a experiência</div></div></section>\n      ' + proof_html + '\n      <div class="div"></div><section class="sec" id="problema">', 1)

          replacements = {
            '<span class="sc-tag">Projeto real · Adega, bar e delivery</span><a class="btn b-ice" href="https://adegasaomarcos.com.br/"': '<span class="sc-tag">Projeto real · Adega, bar e delivery</span><span class="sc-result"><strong>Resultado esperado:</strong> cardápio, delivery, autoridade local e pedido pelo WhatsApp.</span><a class="btn b-ice" href="https://adegasaomarcos.com.br/"',
            '<span class="sc-tag">Projeto real · Advocacia</span><a class="btn b-ice" href="https://olegariotech-site.github.io/cintia-almeida-gomes-advocacia/"': '<span class="sc-tag">Projeto real · Advocacia</span><span class="sc-result"><strong>Resultado esperado:</strong> presença séria, confiança e captação com postura profissional.</span><a class="btn b-ice" href="https://olegariotech-site.github.io/cintia-almeida-gomes-advocacia/"',
            '<span class="sc-tag">Projeto conceito · Mercado local e empório</span><a class="btn b-ice" href="https://wa.me/5511912459144?text=Ola!%20Quero%20ver%20o%20conceito%20Mini%20Mercado%20e%20Emporio%20da%20Olegario%20Tech."': '<span class="sc-tag">Projeto conceito · Mercado local e empório</span><span class="sc-result"><strong>Resultado esperado:</strong> vitrine local para produtos, ofertas e relacionamento com o bairro.</span><a class="btn b-ice" href="https://wa.me/5511912459144?text=Ola!%20Quero%20ver%20o%20conceito%20Mini%20Mercado%20e%20Emporio%20da%20Olegario%20Tech."',
            '<span class="sc-tag">Projeto demonstrativo · Barbearia e salão</span><a class="btn b-ice" href="https://olegariotech-site.github.io/navalha-prime-experience/"': '<span class="sc-tag">Projeto demonstrativo · Barbearia e salão</span><span class="sc-result"><strong>Resultado esperado:</strong> imagem premium para agenda, serviços e experiência do cliente.</span><a class="btn b-ice" href="https://olegariotech-site.github.io/navalha-prime-experience/"'
          }
          for old, new in replacements.items():
              if old in txt:
                  txt = txt.replace(old, new, 1)
              elif new not in txt:
                  raise SystemExit('Microcopy de portfolio nao encontrado para troca')

          if 'proof-strip' not in txt or 'Resultado esperado:' not in txt:
              raise SystemExit('Patch fase 2 incompleto')
          p.write_text(txt, encoding='utf-8')
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Adiciona prova e microcopy no portfolio" || echo "Nada para commitar"
          git push

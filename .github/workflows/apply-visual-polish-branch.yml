name: Apply Visual Polish To Branch

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/apply-visual-polish-branch.yml'

permissions:
  contents: write

jobs:
  patch-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: visual-polish-neural-whatsapp-3d-safe
          persist-credentials: true
      - name: Apply safe visual polish to index only
        run: |
          python3 <<'PY'
          from pathlib import Path
          import base64
          p = Path('index.html')
          txt = p.read_text(encoding='utf-8')
          css = base64.b64decode('LyogT2xlZ2FyaW8gVGVjaCAtIHNhZmUgdmlzdWFsIHBvbGlzaDogbmV1cmFsICsgV2hhdHNBcHAgKyBwb3J0Zm9saW8gZnJhbWVzICovCkBrZXlmcmFtZXMgb3RGcmFtZTNEe0luJTBBfWBlcnJvciB9Cg==').decode('utf-8')
          css = base64.b64decode('').decode('utf-8')
          js = base64.b64decode('').decode('utf-8')
          if 'safe visual polish: neural + WhatsApp + portfolio frames' not in txt:
              txt = txt.replace('</style>', css + '\n  </style>', 1)
          if 'const frames=[...document.querySelectorAll' not in txt:
              txt = txt.replace('</body>', js + '\n</body>', 1)
          p.write_text(txt, encoding='utf-8')
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Aplica polimento visual seguro" || echo "Nada para commitar na branch"
          git push origin HEAD:visual-polish-neural-whatsapp-3d-safe

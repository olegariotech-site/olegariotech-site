name: Apply Visual Polish To Branch

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/apply-visual-polish-branch.yml'

permissions:
  contents: write

jobs:
  patch-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Phase 3 commercial organization guide
        run: |
          python3 <<'PY'
          from pathlib import Path
          p = Path('index.html')
          txt = p.read_text(encoding='utf-8')

          css = ".solution-guide{position:relative}.guide-head{text-align:center;max-width:820px;margin:0 auto 34px}.guide-head .eyebrow{justify-content:center}.guide-head .eyebrow::before{display:none}.guide-head p{max-width:680px;margin:0 auto;color:var(--muted);line-height:1.75}.guide-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}.guide-card{position:relative;display:flex;flex-direction:column;min-height:330px;padding:28px;border-radius:var(--rl);background:linear-gradient(145deg,rgba(10,7,29,.88),rgba(7,5,20,.94));border:1px solid rgba(168,85,247,.14);box-shadow:0 24px 70px rgba(0,0,0,.46);overflow:hidden;isolation:isolate;transition:transform .32s ease,border-color .32s ease,box-shadow .32s ease}.guide-card:hover{transform:translateY(-5px);border-color:rgba(103,232,249,.25);box-shadow:0 34px 86px rgba(0,0,0,.58)}.guide-card::before{content:'';position:absolute;inset:auto -30% -42% -30%;height:64%;background:radial-gradient(ellipse at center,rgba(103,232,249,.11),transparent 64%);z-index:-1}.guide-kicker{font-size:.64rem;letter-spacing:.18em;text-transform:uppercase;color:var(--amber);font-weight:900;margin-bottom:13px}.guide-card h3{font-family:'Syne',sans-serif;font-size:1.25rem;line-height:1.15;letter-spacing:-.035em;margin-bottom:12px}.guide-card p{color:var(--muted);font-size:.92rem;line-height:1.7;margin-bottom:18px}.guide-list{list-style:none;display:grid;gap:9px;margin:0 0 24px}.guide-list li{display:flex;gap:9px;color:rgba(238,240,255,.78);font-size:.86rem;line-height:1.45}.guide-list li::before{content:'>';color:var(--ice);font-weight:900}.guide-link{margin-top:auto;display:inline-flex;align-items:center;justify-content:center;min-height:44px;padding:0 18px;border-radius:999px;background:rgba(103,232,249,.07);border:1px solid rgba(103,232,249,.22);font-weight:900;font-size:.86rem}.guide-card.featured{border-color:rgba(103,232,249,.32);background:linear-gradient(145deg,rgba(12,10,36,.94),rgba(7,5,20,.96))}.guide-card.featured .guide-link{background:linear-gradient(135deg,var(--ice),var(--ice2));color:var(--void);border:0}.guide-note{margin:24px auto 0;max-width:760px;text-align:center;color:var(--muted2);font-size:.9rem;line-height:1.65}.guide-note strong{color:var(--text)}@media(max-width:980px){.guide-grid{grid-template-columns:1fr}.guide-card{min-height:auto}}@media(max-width:640px){.guide-head{text-align:left}.guide-head .eyebrow{justify-content:flex-start}.guide-card{padding:24px 20px}.guide-note{text-align:left}}"
          if 'solution-guide' not in txt:
              txt = txt.replace('</style>', css + '\n  </style>', 1)

          guide_html = '<section class="sec sm solution-guide" id="solucao-ideal"><div class="wrap"><div class="guide-head rv"><span class="eyebrow">Escolha guiada</span><h2 class="stitle">Qual solução combina <span class="hl">com você?</span></h2><p>Antes de escolher preço, escolha o problema certo. A Olegario Tech organiza a solução conforme o momento do seu negócio.</p></div><div class="guide-grid"><article class="guide-card rv d1"><div class="guide-kicker">Presença profissional</div><h3>Quero sair do improviso e parecer mais confiável.</h3><p>Ideal para negócio local que depende de indicação, Instagram e WhatsApp, mas ainda não tem uma base profissional.</p><ul class="guide-list"><li>Site institucional claro e responsivo</li><li>WhatsApp com chamada certa</li><li>SEO local e publicação completa</li></ul><a class="guide-link" href="#planos">Ver site essencial</a></article><article class="guide-card featured rv d2"><div class="guide-kicker">Oferta que vende</div><h3>Quero vender produto, serviço, evento ou campanha.</h3><p>Ideal para ebook, curso, consultoria, lançamento ou ação comercial que precisa de promessa, prova e CTA direto.</p><ul class="guide-list"><li>Copy da oferta e benefícios</li><li>Página de venda persuasiva</li><li>CTA para Kiwify ou WhatsApp</li></ul><a class="guide-link" href="#planos">Ver página de venda</a></article><article class="guide-card rv d3"><div class="guide-kicker">Ecossistema digital</div><h3>Quero organizar site, WhatsApp, criativos e funil.</h3><p>Ideal para quem quer parar de ter peças soltas e montar uma estrutura digital com estratégia comercial.</p><ul class="guide-list"><li>Site + página + WhatsApp</li><li>Criativos e direção visual</li><li>Organização da conversa comercial</li></ul><a class="guide-link" href="#planos">Ver digital completo</a></article></div><p class="guide-note rv d4"><strong>Na dúvida?</strong> Comece pelo diagnóstico gratuito. A ideia é entender seu momento antes de empurrar qualquer plano.</p></div></section>'
          anchor = '<section class="sec" id="planos">'
          if 'id="solucao-ideal"' not in txt:
              pos = txt.find(anchor)
              if pos == -1:
                  raise SystemExit('Ancora planos nao encontrada')
              txt = txt[:pos] + guide_html + '\n      ' + txt[pos:]

          if 'id="solucao-ideal"' not in txt:
              raise SystemExit('Guia nao inserido')
          p.write_text(txt, encoding='utf-8')
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Adiciona guia de solucao antes dos planos" || echo "Nada para commitar"
          git push

name: Apply Visual Polish To Branch

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/apply-visual-polish-branch.yml'

permissions:
  contents: write

jobs:
  patch-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Replace warning marks with premium problem icons
        run: |
          python3 <<'PY'
          from pathlib import Path
          p = Path('index.html')
          txt = p.read_text(encoding='utf-8')
          old_css = ".pico{width:38px;height:38px;border-radius:11px;background:rgba(245,158,11,.09);border:1px solid rgba(245,158,11,.16);display:grid;place-items:center;color:var(--amber)}"
          new_css = ".pico{width:46px;height:46px;border-radius:14px;display:grid;place-items:center;flex:0 0 46px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);box-shadow:0 14px 28px rgba(0,0,0,.22);color:var(--amber)}.pico svg{width:24px;height:24px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}.pico.social{color:#c084fc;background:linear-gradient(135deg,rgba(168,85,247,.18),rgba(236,72,153,.08));border-color:rgba(192,132,252,.22);box-shadow:0 0 24px rgba(168,85,247,.14)}.pico.wa{color:var(--green);background:linear-gradient(135deg,rgba(37,211,102,.18),rgba(18,140,126,.08));border-color:rgba(37,211,102,.22);box-shadow:0 0 24px rgba(37,211,102,.14)}.pico.digital{color:var(--ice);background:linear-gradient(135deg,rgba(103,232,249,.18),rgba(59,130,246,.08));border-color:rgba(103,232,249,.22);box-shadow:0 0 24px rgba(103,232,249,.14)}"
          if old_css in txt:
              txt = txt.replace(old_css, new_css, 1)
          elif '.pico svg' not in txt:
              raise SystemExit('CSS .pico original nao encontrado')
          pairs = [
            ('<div class="pcard"><div class="pico">!</div><div><h4>Rede social sozinha não sustenta autoridade</h4><p>O cliente precisa de uma base clara para entender quem você é, o que vende e por que confiar.</p></div></div>', '<div class="pcard"><div class="pico social"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 16.5V7.5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2Z"/><path d="M8 15l2.4-3 2 1.7L16 9"/><path d="M8 9h2"/></svg></div><div><h4>Rede social sozinha não sustenta autoridade</h4><p>O cliente precisa de uma base clara para entender quem você é, o que vende e por que confiar.</p></div></div>'),
            ('<div class="pcard"><div class="pico">!</div><div><h4>WhatsApp sem contexto vira briga por preço</h4><p>Quando a página educa antes, a conversa chega mais quente e menos refém do desconto.</p></div></div>', '<div class="pcard"><div class="pico wa"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 4a7.5 7.5 0 0 0-6.4 11.4L5 20l4.7-1.2A7.5 7.5 0 1 0 12 4Z"/><path d="M9.4 9.2c.2-.3.4-.4.7-.2l1 .6c.2.1.3.4.2.6l-.3.6c.5 1 1.2 1.7 2.2 2.2l.6-.3c.2-.1.5 0 .6.2l.6 1c.2.3.1.5-.2.7-.6.4-1.3.5-2 .2-2.1-.8-3.8-2.5-4.6-4.6-.3-.7-.2-1.4.2-2Z"/></svg></div><div><h4>WhatsApp sem contexto vira briga por preço</h4><p>Quando a página educa antes, a conversa chega mais quente e menos refém do desconto.</p></div></div>'),
            ('<div class="pcard"><div class="pico">!</div><div><h4>Produto digital sem página perde valor</h4><p>Ebook, curso e serviço precisam de promessa, prova, oferta e chamada direta para compra.</p></div></div>', '<div class="pcard"><div class="pico digital"><svg viewBox="0 0 24 24" aria-hidden="true"><rect x="6" y="4" width="12" height="16" rx="2"/><path d="M9 8h6M9 12h6M9 16h3"/></svg></div><div><h4>Produto digital sem página perde valor</h4><p>Ebook, curso e serviço precisam de promessa, prova, oferta e chamada direta para compra.</p></div></div>')
          ]
          for old, new in pairs:
              if old in txt:
                  txt = txt.replace(old, new, 1)
              elif new not in txt:
                  raise SystemExit('Card de problema nao encontrado para troca')
          p.write_text(txt, encoding='utf-8')
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Troca alertas por ícones premium nos problemas" || echo "Nada para commitar"
          git push

name: Apply Visual Polish To Branch

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/apply-visual-polish-branch.yml'

permissions:
  contents: write

jobs:
  patch-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Phase 1 copy and conversion updates
        run: |
          python3 <<'PY'
          from pathlib import Path
          p = Path('index.html')
          txt = p.read_text(encoding='utf-8')

          css_old = ".hsub{font-size:clamp(1rem,.9rem + .35vw,1.18rem);line-height:1.75;color:var(--muted);max-width:630px;margin-bottom:34px}.hact{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:32px}"
          css_new = ".hsub{font-size:clamp(1rem,.9rem + .35vw,1.18rem);line-height:1.75;color:var(--muted);max-width:630px;margin-bottom:20px}.hero-chips{display:flex;gap:10px;flex-wrap:wrap;margin:0 0 30px}.hero-chip{display:inline-flex;align-items:center;gap:8px;min-height:34px;padding:0 12px;border-radius:999px;background:rgba(103,232,249,.06);border:1px solid rgba(103,232,249,.14);color:rgba(238,240,255,.78);font-size:.72rem;font-weight:800;letter-spacing:.05em;text-transform:uppercase}.hero-chip::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--ice);box-shadow:0 0 12px rgba(103,232,249,.8)}.hero-chip:nth-child(2)::before{background:var(--green);box-shadow:0 0 12px rgba(37,211,102,.7)}.hero-chip:nth-child(3)::before{background:var(--amber);box-shadow:0 0 12px rgba(245,158,11,.7)}.hero-chip:nth-child(4)::before{background:var(--purple);box-shadow:0 0 12px rgba(168,85,247,.7)}.hact{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:32px}"
          if '.hero-chips' not in txt:
              if css_old not in txt:
                  raise SystemExit('CSS do hero nao encontrado')
              txt = txt.replace(css_old, css_new, 1)

          txt = txt.replace('Sites, páginas de venda e presença digital para negócios que querem <span class="hero-word" id="heroWord">vender melhor.</span>', 'Sites e páginas de venda para negócios que precisam <span class="hero-word" id="heroWord">parecer grandes.</span>', 1)
          old_sub = '<p class="hsub reveal-words">A Olegario Tech une design premium, estratégia comercial, WhatsApp, SEO local e produtos digitais para transformar sua presença online em autoridade, conversa e venda.</p>'
          new_sub = '<p class="hsub reveal-words">Criamos páginas profissionais com visual premium, texto comercial e WhatsApp bem guiado para transformar visita em conversa.</p><div class="hero-chips" aria-label="Diferenciais Olegario Tech"><span class="hero-chip">Design premium</span><span class="hero-chip">Mobile perfeito</span><span class="hero-chip">WhatsApp integrado</span><span class="hero-chip">Visão comercial</span></div>'
          if 'class="hero-chips"' not in txt:
              txt = txt.replace(old_sub, new_sub, 1)

          replacements = {
            'https://wa.me/5511912459144?text=Ola!%20Vim%20pelo%20site%20da%20OLEGARIO%20TECH%20e%20quero%20criar%20meu%20site.': 'https://wa.me/5511912459144?text=Ola!%20Vim%20pelo%20site%20da%20OLEGARIO%20TECH%20e%20quero%20um%20diagnostico%20gratuito%20para%20meu%20negocio.',
            '>Quero criar meu site</a>': '>Quero um diagnóstico gratuito</a>',
            '<a class="btn b-gh" href="#produtos">Ver produtos digitais</a>': '<a class="btn b-gh" href="#portfolio">Ver projetos reais</a>',
            '<a class="btn b-ice" href="#planos">Ver soluções</a>': '<a class="btn b-ice" href="#planos">Ver planos</a>',
            'https://wa.me/5511912459144?text=Ola!%20Vim%20pelo%20site%20da%20OLEGARIO%20TECH%20e%20quero%20solicitar%20um%20orcamento.': 'https://wa.me/5511912459144?text=Ola!%20Vim%20pelo%20site%20da%20OLEGARIO%20TECH%20e%20quero%20um%20diagnostico%20gratuito.',
            '>Solicitar Orçamento</a>': '>Diagnóstico gratuito</a>',
            'Criar meu site com a Olegario Tech': 'Diagnóstico gratuito Olegario Tech',
            'https://wa.me/5511912459144?text=Ola!%20Vim%20pelo%20site%20da%20OLEGARIO%20TECH%20e%20quero%20pedir%20um%20orcamento.': 'https://wa.me/5511912459144?text=Ola!%20Vim%20pelo%20site%20da%20OLEGARIO%20TECH%20e%20quero%20um%20diagnostico%20gratuito.',
            'Para sair do improviso e ter uma base profissional.': 'Para quem precisa sair do Instagram e ter uma presença profissional.',
            'Para ebook, curso, consultoria, evento ou campanha.': 'Para quem quer vender ebook, curso, evento, consultoria ou campanha.',
            'Para negócios que precisam parecer maiores e vender confiança.': 'Para quem precisa gerar confiança antes do cliente chamar no WhatsApp.',
            'Site, página de venda, WhatsApp, criativos e organização comercial.': 'Para quem quer organizar site, WhatsApp, criativos e funil comercial.',
            'https://wa.me/5511912459144?text=Ola!%20Quero%20o%20plano%20Presenca%20Local.': 'https://wa.me/5511912459144?text=Ola!%20Vim%20pelo%20site%20da%20OLEGARIO%20TECH%20e%20quero%20entender%20se%20o%20plano%20Presenca%20Local%20faz%20sentido%20para%20meu%20negocio.',
            '>Pedir proposta</a>': '>Quero esse plano</a>',
            'https://wa.me/5511912459144?text=Ola!%20Quero%20uma%20pagina%20de%20venda.': 'https://wa.me/5511912459144?text=Ola!%20Quero%20vender%20meu%20produto%20digital%20com%20uma%20pagina%20de%20venda%20da%20Olegario%20Tech.',
            '>Criar página</a>': '>Quero vender meu produto</a>',
            'https://wa.me/5511912459144?text=Ola!%20Quero%20o%20plano%20Site%20Profissional.': 'https://wa.me/5511912459144?text=Ola!%20Quero%20um%20site%20profissional%20para%20gerar%20mais%20confianca%20e%20chamadas%20no%20WhatsApp.',
            '>Falar com Alexandre</a>': '>Quero um site profissional</a>',
            'https://wa.me/5511912459144?text=Ola!%20Quero%20montar%20um%20ecossistema%20digital%20completo.': 'https://wa.me/5511912459144?text=Ola!%20Quero%20montar%20um%20ecossistema%20digital%20com%20site%2C%20WhatsApp%2C%20criativos%20e%20funil.',
            '>Montar projeto</a>': '>Quero montar meu ecossistema</a>',
            'https://wa.me/5511912459144?text=Ola!%20Quero%20criar%20minha%20estrutura%20digital%20com%20a%20Olegario%20Tech.': 'https://wa.me/5511912459144?text=Ola!%20Quero%20um%20diagnostico%20gratuito%20para%20melhorar%20minha%20presenca%20digital%20com%20a%20Olegario%20Tech.',
            '>Criar minha estrutura digital</a>': '>Quero meu diagnóstico gratuito</a>'
          }
          for old, new in replacements.items():
              txt = txt.replace(old, new)

          if 'hero-chips' not in txt or 'Quero um diagnóstico gratuito' not in txt or 'Quero vender meu produto' not in txt:
              raise SystemExit('Patch de copy incompleto')
          p.write_text(txt, encoding='utf-8')
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Ajusta copy e CTAs da fase 1" || echo "Nada para commitar"
          git push

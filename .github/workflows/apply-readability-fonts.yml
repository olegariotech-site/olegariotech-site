name: Apply readability fonts

on:
  push:
    paths:
      - '.github/workflows/apply-readability-fonts.yml'

permissions:
  contents: write

jobs:
  patch-fonts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update fonts and readability CSS
        shell: python
        run: |
          from pathlib import Path
          import re

          FONT_LINK = '<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet" />'

          READABILITY_CSS = """
    /* READABILITY UPDATE — Olegario Tech 2026-07 */
    :root{--readable-text:#f6f7ff;--readable-muted:#c1c7dc}
    body{font-family:'Inter',system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;letter-spacing:-.01em}
    h1,h2,h3,.htitle,.stitle,.question,.brand,.preloader-mark,.preloader-percent{font-family:'Space Grotesk',system-ui,sans-serif}
    .eyebrow,.nav-l a,.hbadge,.chip,.tag,.kpi-label,.faq-q,.mini,.xp-hint{letter-spacing:.08em}
    p,.lead,.hsub,.ssub,.case-text,.card p,.faq-a,.flow-card p,.about p,.plan p,.small{font-size:clamp(1rem,.96rem + .18vw,1.12rem);line-height:1.78;color:var(--readable-muted)}
    .htitle,.stitle{letter-spacing:-.035em;line-height:1.04}
    .hsub{max-width:720px}
    @media(max-width:640px){.htitle{font-size:clamp(2.25rem,12vw,3.25rem);line-height:1.02}.stitle{font-size:clamp(2rem,10vw,2.8rem)}p,.lead,.hsub,.ssub{font-size:1.02rem;line-height:1.72}.brand{letter-spacing:.08em}}
"""

          def patch_file(path: str) -> None:
              file_path = Path(path)
              if not file_path.exists():
                  return

              html = file_path.read_text(encoding='utf-8')

              html = re.sub(
                  r'<link href="https://fonts\.googleapis\.com/css2\?family=Syne[^\"]+&display=swap" rel="stylesheet" />',
                  FONT_LINK,
                  html,
              )

              html = html.replace("font-family:'DM Sans',system-ui,sans-serif", "font-family:'Inter',system-ui,sans-serif")
              html = html.replace("font-family:'DM Sans',system-ui, sans-serif", "font-family:'Inter',system-ui,sans-serif")
              html = html.replace("font-family:'Syne',sans-serif", "font-family:'Space Grotesk',system-ui,sans-serif")
              html = html.replace("font-family:'Syne',system-ui,sans-serif", "font-family:'Space Grotesk',system-ui,sans-serif")

              if 'READABILITY UPDATE — Olegario Tech' not in html:
                  html = html.replace('\n  </style>', READABILITY_CSS + '\n  </style>', 1)

              file_path.write_text(html, encoding='utf-8')

          patch_file('index.html')
          patch_file('diagnostico-digital/index.html')

      - name: Commit readability changes
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No readability changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html diagnostico-digital/index.html
          git commit -m "feat: melhorar legibilidade das fontes"
          git push

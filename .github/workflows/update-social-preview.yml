name: Update Social Preview

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/update-social-preview.yml'

permissions:
  contents: write

jobs:
  patch-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Update social meta tags
        run: |
          python3 <<'PY'
          from pathlib import Path
          p = Path('index.html')
          txt = p.read_text(encoding='utf-8')
          replacements = {
            '<title>Olegario Tech | Sites, Páginas de Venda e Presença Digital em Valinhos</title>': '<title>Olegario Tech | Sites e páginas de venda para negócios que querem crescer</title>',
            '<meta name="description" content="A Olegario Tech cria sites profissionais, landing pages, páginas de venda, estruturas com WhatsApp e presença digital premium para negócios de Valinhos, Campinas e região." />': '<meta name="description" content="Sites e páginas de venda com design premium, WhatsApp integrado e visão comercial para negócios que querem crescer e vender melhor em Valinhos, Campinas e região." />',
            '<meta property="og:title" content="Olegario Tech | Sites e Páginas de Venda com Visão Comercial" />': '<meta property="og:title" content="Olegario Tech | Sites e páginas de venda para negócios que querem crescer" />',
            '<meta property="og:description" content="Design premium, estratégia comercial, WhatsApp, SEO local e páginas que transformam visita em conversa real." />': '<meta property="og:description" content="Design premium, WhatsApp integrado e visão comercial para negócios que querem crescer e vender melhor." />',
            'https://olegariotech.com.br/assets/img/og-image-v3.jpg?v=7': 'https://olegariotech.com.br/assets/img/og-image-v3.jpg?v=8',
            '<meta name="twitter:card" content="summary_large_image" />': '<meta name="twitter:card" content="summary_large_image" />\n  <meta name="twitter:title" content="Olegario Tech | Sites e páginas de venda para negócios que querem crescer" />\n  <meta name="twitter:description" content="Design premium, WhatsApp integrado e visão comercial para negócios que querem crescer e vender melhor." />\n  <meta name="twitter:image" content="https://olegariotech.com.br/assets/img/og-image-v3.jpg?v=8" />'
          }
          for old, new in replacements.items():
              if old in txt:
                  txt = txt.replace(old, new, 1)
          if 'og-image-v3.jpg?v=8' not in txt or 'crescer e vender melhor' not in txt:
              raise SystemExit('Meta social nao atualizada')
          p.write_text(txt, encoding='utf-8')
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Atualiza meta tags da preview social" || echo "Nada para commitar"
          git push

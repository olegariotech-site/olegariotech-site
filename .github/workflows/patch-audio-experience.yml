name: Patch Audio Experience

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/patch-audio-experience.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Apply immersive audio experience
        run: |
          python3 <<'PY'
          from pathlib import Path
          p = Path('index.html')
          txt = p.read_text(encoding='utf-8')
          css_marker = ".reveal-words .w{display:inline-block;opacity:.08;filter:blur(8px);transform:translateY(14px);transition:opacity .55s cubic-bezier(.16,1,.3,1),filter .55s cubic-bezier(.16,1,.3,1),transform .55s cubic-bezier(.16,1,.3,1)}.reveal-words .w.lit{opacity:1;filter:blur(0);transform:none}"
          css_extra = ".xp-hint{display:inline-flex;align-items:center;gap:10px;margin:0 0 22px;padding:10px 15px;border-radius:999px;background:rgba(103,232,249,.07);border:1px solid rgba(103,232,249,.18);color:rgba(238,240,255,.78);font-size:.78rem;font-weight:800;letter-spacing:.02em;box-shadow:0 14px 34px rgba(0,0,0,.18);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);transition:opacity .45s ease,transform .45s ease}.xp-hint::before{content:'';width:8px;height:8px;border-radius:50%;background:var(--ice);box-shadow:0 0 18px rgba(103,232,249,.8);animation:xpPulse 1.8s ease-in-out infinite}.xp-hint.off{opacity:0;transform:translateY(-8px);pointer-events:none}@keyframes xpPulse{0%,100%{transform:scale(.8);opacity:.55}50%{transform:scale(1.25);opacity:1}}@media(min-width:641px){.mobile-copy{display:none}}"
          if '.xp-hint' not in txt:
              txt = txt.replace(css_marker, css_marker + css_extra, 1)
          media_marker = '@media(max-width:640px){.wrap{width:calc(100% - 28px)}'
          if '.desktop-copy{display:none}' not in txt:
              txt = txt.replace(media_marker, '@media(max-width:640px){.desktop-copy{display:none}.xp-hint{align-items:flex-start;border-radius:18px;line-height:1.35;margin-bottom:18px}.wrap{width:calc(100% - 28px)}', 1)
          hsub = '<p class="hsub reveal-words">A Olegario Tech une design premium, estratégia comercial, WhatsApp, SEO local e produtos digitais para transformar sua presença online em autoridade, conversa e venda.</p>'
          hint = '<div id="xpHint" class="xp-hint" role="note"><span class="desktop-copy">Clique na tela para ativar a experiência imersiva da Olegario Tech.</span><span class="mobile-copy">Toque na tela para ativar a experiência imersiva da Olegario Tech.</span></div>'
          if 'id="xpHint"' not in txt:
              txt = txt.replace(hsub, hint + hsub, 1)
          txt = txt.replace('target=(1-Math.pow(1-p,3))*.62;', 'target=(1-Math.pow(1-p,3))*.38;')
          start = txt.find('    function scrollAudio(){')
          if start == -1:
              start = txt.find('  function scrollAudio(){')
          end_marker = 'scrollAudio();'
          end = txt.find(end_marker, start)
          if start == -1 or end == -1:
              raise SystemExit('scrollAudio não encontrado')
          end += len(end_marker)
          new_func = """  function scrollAudio(){const audio=document.getElementById('aud'),mb=document.getElementById('mb'),hint=document.getElementById('xpHint');if(!audio||!mb)return;let target=0,cur=0,muted=true,started=false,userTouched=false;audio.volume=0;audio.muted=true;mb.classList.add('m');function calc(){const max=Math.max(1,document.documentElement.scrollHeight-innerHeight);const p=Math.min(1,Math.max(0,scrollY/max));target=(1-Math.pow(1-p,3))*.38}function hideHint(){if(hint){hint.classList.add('off');setTimeout(()=>{hint.style.display='none'},650)}}function start(){if(started)return;audio.load();audio.play().then(()=>{started=true;if(!muted)audio.muted=false;hideHint()}).catch(()=>{})}function activateExperience(){if(userTouched)return;userTouched=true;muted=false;mb.classList.remove('m');audio.muted=false;calc();start()}function toggle(e){if(e)e.stopPropagation();userTouched=true;muted=!muted;mb.classList.toggle('m',muted);audio.muted=muted;if(!muted){start();calc();hideHint()}}mb.addEventListener('click',toggle);mb.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();toggle(e)}});document.addEventListener('pointerdown',activateExperience,{once:true,passive:true});document.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){activateExperience()}},{once:true});addEventListener('scroll',calc,{passive:true});(function smooth(){if(!muted){cur+=(target-cur)*.045;audio.volume=Math.max(0,Math.min(1,cur));audio.muted=cur<.01}else{cur+=(0-cur)*.09;audio.volume=Math.max(0,cur)}requestAnimationFrame(smooth)})();calc()}scrollAudio();"""
          txt = txt[:start] + new_func + txt[end:]
          p.write_text(txt, encoding='utf-8')
          wf = Path('.github/workflows/patch-audio-experience.yml')
          if wf.exists():
              wf.unlink()
          PY
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/patch-audio-experience.yml
          git commit -m "Ativa experiência sonora no primeiro toque" || echo "Nada para commitar"
          git push

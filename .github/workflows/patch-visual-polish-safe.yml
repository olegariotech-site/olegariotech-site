name: Patch Visual Polish Safe

on:
  workflow_dispatch:
  push:
    branches: [ visual-polish-neural-whatsapp-3d-safe ]
    paths:
      - '.github/workflows/patch-visual-polish-safe.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Apply safe visual polish
        run: |
          python3 <<'PY'
          from pathlib import Path
          p = Path('index.html')
          txt = p.read_text(encoding='utf-8')
          css = r'''
/* Olegario Tech - safe visual polish: neural + WhatsApp + portfolio frames */
@keyframes otFrame3DIn{0%{opacity:.72;transform:perspective(1200px) rotateY(12deg) rotateX(-3deg) translateY(22px) scale(.985);filter:blur(3px)}65%{opacity:1}100%{opacity:1;transform:perspective(1200px) rotateY(0) rotateX(0) translateY(0) scale(1);filter:blur(0)}}
.showcase-frame{transform-style:preserve-3d;backface-visibility:hidden;transition:transform .18s ease,box-shadow .35s ease,filter .35s ease;will-change:auto}.showcase-frame.ot-3d-ready{opacity:.96}.showcase-frame.ot-3d-in{animation:otFrame3DIn .82s cubic-bezier(.16,1,.3,1) both;animation-delay:var(--otDelay,0ms)}.showcase-frame.ot-tilt{transition:transform .08s ease-out,box-shadow .28s ease}.showcase-frame.ot-tilt::after{opacity:.28}.fab.ot-cta-urgent{box-shadow:0 16px 48px rgba(37,211,102,calc(.24 + var(--otUrgency,.4)*.18));filter:saturate(calc(1 + var(--otUrgency,.4)*.14))}.fab.ot-cta-urgent:hover{box-shadow:0 20px 58px rgba(37,211,102,calc(.32 + var(--otUrgency,.4)*.16))}#neural{transition:filter .32s ease-out}#neural.ot-neural-live{filter:saturate(calc(1.02 + var(--otNeural,.18)*.18)) brightness(calc(1 + var(--otNeural,.18)*.05))}
@media(max-width:768px),(hover:none){.showcase-frame.ot-3d-in{animation-duration:.62s}.showcase-frame.ot-tilt{transform:none!important}.fab.ot-cta-urgent{box-shadow:0 12px 34px rgba(37,211,102,.28)}}
@media(prefers-reduced-motion:reduce){.showcase-frame.ot-3d-in{animation:none}.showcase-frame,.fab,#neural{transition:none!important}}
'''
          if 'safe visual polish: neural + WhatsApp + portfolio frames' not in txt:
              txt = txt.replace('</style>', css + '\n  </style>', 1)
          js = r'''
<script>
(function(){
  'use strict';
  const reduced=matchMedia('(prefers-reduced-motion: reduce)').matches;
  const mobile=matchMedia('(hover:none)').matches||innerWidth<768;
  if(reduced)return;
  let lastY=scrollY,velocity=0,ticking=false;
  const neural=document.getElementById('neural');
  const fab=document.querySelector('.fab');
  function update(){
    const max=Math.max(1,document.documentElement.scrollHeight-innerHeight);
    const progress=Math.min(1,Math.max(0,scrollY/max));
    const live=Math.min(1,velocity*.65+progress*.25);
    if(neural){neural.classList.add('ot-neural-live');neural.style.setProperty('--otNeural',live.toFixed(3));}
    if(fab){fab.style.setProperty('--otUrgency',progress.toFixed(3));fab.classList.toggle('ot-cta-urgent',progress>.28);}
    velocity*=.82;
    ticking=false;
  }
  function onScroll(){
    const dy=Math.abs(scrollY-lastY);lastY=scrollY;velocity=Math.min(1,dy/90);
    if(!ticking){ticking=true;requestAnimationFrame(update);}
  }
  addEventListener('scroll',onScroll,{passive:true});
  update();
  const frames=[...document.querySelectorAll('.showcase-frame')];
  if(frames.length){
    const io=new IntersectionObserver(entries=>{entries.forEach(entry=>{if(entry.isIntersecting){entry.target.classList.add('ot-3d-in');io.unobserve(entry.target);}})},{threshold:.18,rootMargin:'0px 0px -10% 0px'});
    frames.forEach((frame,i)=>{frame.classList.add('ot-3d-ready');frame.style.setProperty('--otDelay',`${Math.min(i*90,360)}ms`);io.observe(frame);});
    if(!mobile){
      frames.forEach(frame=>{
        frame.addEventListener('pointermove',e=>{
          const r=frame.getBoundingClientRect();
          const x=(e.clientX-r.left-r.width/2)/r.width;
          const y=(e.clientY-r.top-r.height/2)/r.height;
          frame.classList.add('ot-tilt');
          frame.style.transform=`perspective(1200px) rotateX(${-y*4.5}deg) rotateY(${x*4.5}deg) translateZ(10px)`;
        });
        frame.addEventListener('pointerleave',()=>{frame.classList.remove('ot-tilt');frame.style.transform='';});
      });
    }
  }
})();
</script>
'''
          if 'const frames=[...document.querySelectorAll' not in txt:
              txt = txt.replace('</body>', js + '\n</body>', 1)
          p.write_text(txt, encoding='utf-8')
          wf = Path('.github/workflows/patch-visual-polish-safe.yml')
          if wf.exists(): wf.unlink()
          PY
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/patch-visual-polish-safe.yml
          git commit -m "Aplica polimento visual seguro" || echo "Nada para commitar"
          git push
